<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glass Card</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="profilepic">
                    <img src="devesh.jpg" alt="Profile Photo">
                </div>
                <div class="Status">Active</div>
            </div>
            <div class="card-body">
                <h2 class="Name">Devesh Chaudhary</h2>
                <p class="title">Full Stack Developer</p>
                <p class="bio">Passionate about creating beautiful and functional websites. Chai Lover 🍵 </p>

                <div class="stats">
                    <div class="stats-item">
                        <h3>3.4k</h3>
                        <p>Followers</p>
                    </div>
                    <div class="stats-item">
                        <h3>982</h3>
                        <p>Following</p>
                    </div>
                    <div class="stats-items">
                        <h3>42</h3>
                        <p>Projects</p>
                    </div>
                </div>

                <div class="socials">
                    <a href="#" class="social-btn">Github</a>
                    <a href="#" class="social-btn">LinkedIn</a>
                    <a href="#" class="social-btn">X</a>
                </div>

                <div class="follow-btn">Follow</div>

            </div>
        </div>
    </div>
</body>
</html>
